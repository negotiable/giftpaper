<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sean Lockwood</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: inherit;
      padding: 20px;
    }

    a:link, a:visited {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ── Layout ─────────────────────────────────────── */

    .row {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .col {
      flex: 1;
      min-width: 0;
    }

    /* ── Story column ────────────────────────────────── */

    #story-img {
      width: 100%;
      height: auto;
      display: block;
    }

    #story-caption {
      font-style: italic;
      margin-top: 4px;
      font-size: 0.85em;
    }

    #story-empty {
      color: #aaa;
    }

    /* ── News column ─────────────────────────────────── */

    #news-body {
      margin-bottom: 8px;
    }

    #news-body img {
      max-width: 100%;
      height: auto;
    }

    #news-footer {
      font-style: italic;
      font-size: 0.85em;
      margin-top: 4px;
    }

    hr {
      border: none;
      border-top: 1px solid black;
      margin: 12px 0;
      width: 50%;
      margin-inline-start: 0;
    }

    #archive-toggle {
      cursor: pointer;
    }

    #archive-list {
      display: none;
      list-style: none;
      padding: 0;
      margin-top: 4px;
    }

    #archive-list li {
      margin-bottom: 2px;
    }

    /* ── Mobile ──────────────────────────────────────── */

    @media screen and (max-width: 700px) {
      .row {
        flex-direction: column;
      }
      hr {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="row">

  <!-- Column 1: Story -->
  <div class="col" id="col-story">
    <div id="story-container">
      <span id="story-empty">—</span>
    </div>
  </div>

  <!-- Column 2: Info -->
  <div class="col" id="col-info">
    <p>Sean Lockwood</p>
    <p><a href="/cv.pdf">CV</a></p>
  </div>

  <!-- Column 3: News -->
  <div class="col" id="col-news">
    <p>News</p>
    <div id="news-body"></div>
    <p id="news-footer"></p>
    <a href="#" id="archive-toggle">News archives</a>
    <ul id="archive-list"></ul>
  </div>

</div>

<script>
// ── Format date as "31 Jan 2020" ───────────────────────────────────────────
function formatDate(isoString) {
  var d = new Date(isoString);
  var months = ['Jan','Feb','Mar','Apr','May','Jun',
                'Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

// Format date+time as "31 Jan 2020, 14:18"
function formatDateTime(isoString) {
  var d = new Date(isoString);
  var months = ['Jan','Feb','Mar','Apr','May','Jun',
                'Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = d.getHours().toString().padStart(2, '0');
  var m = d.getMinutes().toString().padStart(2, '0');
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear()
         + ', ' + h + ':' + m;
}

// ── Load story ─────────────────────────────────────────────────────────────
fetch('stories.json')
  .then(function(r) { return r.json(); })
  .then(function(stories) {
    var container = document.getElementById('story-container');
    if (!stories || stories.length === 0) {
      container.innerHTML = '<span id="story-empty">—</span>';
      return;
    }
    var latest = stories[0]; // most recent is first (Worker unshifts)
    var dt = formatDateTime(latest.posted);
    container.innerHTML =
      '<img id="story-img" src="' + latest.path + '" alt="">' +
      '<p id="story-caption"><em>posted by head and shoulders @ ' + dt + '</em></p>';
  })
  .catch(function() {
    document.getElementById('story-container').innerHTML =
      '<span id="story-empty">—</span>';
  });

// ── Load news ──────────────────────────────────────────────────────────────
fetch('news.json')
  .then(function(r) { return r.json(); })
  .then(function(posts) {
    if (!posts || posts.length === 0) return;

    var archiveList = document.getElementById('archive-list');
    var newsBody    = document.getElementById('news-body');
    var newsFooter  = document.getElementById('news-footer');

    // Show most recent post by default
    var current = posts.length - 1;

    function showPost(index) {
      newsBody.innerHTML = posts[index].content;
      newsFooter.innerHTML =
        '<em>posted by thumbnail @ ' + formatDate(posts[index].published) + '</em>';
      current = index;
    }

    showPost(current);

    // Build archive list (newest first)
    for (var i = posts.length - 1; i >= 0; i--) {
      (function(idx) {
        var li = document.createElement('li');
        var a  = document.createElement('a');
        a.href = '#';
        a.textContent = formatDate(posts[idx].published);
        a.addEventListener('click', function(e) {
          e.preventDefault();
          showPost(idx);
          // Collapse archive after selection
          archiveList.style.display = 'none';
        });
        li.appendChild(a);
        archiveList.appendChild(li);
      })(i);
    }

    // Archive toggle
    var toggle = document.getElementById('archive-toggle');
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      archiveList.style.display =
        archiveList.style.display === 'none' ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
