# GIFTPAPER STORIES — AUTO-CLEANUP
# ==================================
# Runs daily and deletes story images + cleans stories.json
# for any entries older than 60 days.
#
# SETUP:
# ------
# 1. Create a GitHub Personal Access Token with 'repo' scope
#    (can reuse the same one from the Cloudflare Worker, or make a separate one)
#
# 2. Add it as a repository secret:
#    Your repo on github.com → Settings → Secrets and variables → Actions
#    → New repository secret
#    Name: CLEANUP_TOKEN
#    Value: your token
#
# 3. Commit this file to .github/workflows/cleanup.yml in your repo.
#    The action will run automatically every day at 02:00 UTC.
#    You can also trigger it manually via Actions → cleanup → Run workflow.

name: cleanup old stories

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLEANUP_TOKEN }}

      - name: Delete stories older than 60 days
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          CUTOFF_DAYS = 60
          STORIES_JSON = "stories.json"
          STORIES_IMG_DIR = "img/stories"

          now = datetime.now(timezone.utc)
          cutoff = now - timedelta(days=CUTOFF_DAYS)

          # Load stories.json
          if not os.path.exists(STORIES_JSON):
              print("No stories.json found, nothing to do.")
              sys.exit(0)

          with open(STORIES_JSON, "r") as f:
              stories = json.load(f)

          kept = []
          deleted_count = 0

          for story in stories:
              posted = datetime.fromisoformat(story["posted"].replace("Z", "+00:00"))
              if posted < cutoff:
                  # Delete the image file if it exists
                  img_path = story.get("path", "")
                  if img_path and os.path.exists(img_path):
                      os.remove(img_path)
                      print(f"Deleted: {img_path}")
                  else:
                      print(f"Image not found (already gone?): {img_path}")
                  deleted_count += 1
              else:
                  kept.append(story)

          # Write updated stories.json
          with open(STORIES_JSON, "w") as f:
              json.dump(kept, f, indent=2)

          print(f"Cleanup complete: {deleted_count} deleted, {len(kept)} kept.")
          EOF

      - name: Commit cleanup if anything changed
        run: |
          git config user.name "giftpaper-cleanup"
          git config user.email "cleanup@giftpaper.pictures"
          git add stories.json img/stories/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "Nothing to clean up."
          else
            git commit -m "cleanup: remove stories older than 60 days"
            git push
          fi
